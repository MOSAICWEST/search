name: Update Google Sheet Data Daily

on:
  schedule:
    - cron: '5 15 * * *'  # 매일 15:05 UTC = 한국시간 00:05
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-google-sheet-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Google Sheets JSON
        env:
          SHEET_JSON_URL: ${{ secrets.SHEET_JSON_URL }}
        run: |
          set -euo pipefail

          curl \
            --location \
            --fail \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            "$SHEET_JSON_URL" \
            -o data.tmp.json

          test -s data.tmp.json

          jq empty data.tmp.json

          mv data.tmp.json data.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --cached --quiet; then
            echo "No changes detected. Nothing to commit."
          else
            git commit -m "Update sheet data"
            git push
          fi
